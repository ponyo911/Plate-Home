<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쇼핑 도우미 | PLATE & HOME</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <style>
        .chat-page {
            max-width: 1000px;
            margin: 100px auto 80px;
            padding: 0 24px;
        }

        .chat-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .chat-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .chat-header p {
            font-size: 14px;
            color: #888;
        }

        .chat-box {
            border: 1px solid #e5e5e5;
            background: #fff;
            height: 520px;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }

        .msg {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            max-width: 80%;
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-bubble {
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.7;
            border-radius: 12px;
        }

        .msg.bot .msg-bubble {
            background: #f5f5f5;
            color: #111;
            border-radius: 0 12px 12px 12px;
        }

        .msg.user .msg-bubble {
            background: #111;
            color: #fff;
            border-radius: 12px 0 12px 12px;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .msg.bot .msg-avatar {
            background: #111;
            color: #fff;
        }

        .msg.user .msg-avatar {
            background: #e5e5e5;
            color: #111;
        }

        .chat-input-wrap {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            height: 52px;
            border: 1px solid #ccc;
            padding: 0 16px;
            font-size: 14px;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: #111;
        }

        .chat-send-btn {
            width: 80px;
            height: 52px;
            background: #111;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .chat-send-btn:hover {
            background: #333;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f5f5f5;
            border-radius: 0 12px 12px 12px;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .quick-btn {
            padding: 8px 14px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 13px;
            cursor: pointer;
            border-radius: 99px;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #111;
            color: #fff;
            border-color: #111;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="inner header-inner">
            <a href="./index.html" class="logo">PLATE &amp; HOME</a>
        </div>
    </header>

    <main class="chat-page">
        <div class="chat-header">
            <h2>🍽️ 쇼핑 도우미</h2>
            <p>상품 추천, 배송 안내, 교환/반품 등 무엇이든 물어보세요.</p>
        </div>

        <div class="quick-btns">
            <button class="quick-btn" onclick="sendQuick('인기 상품 추천해줘')">인기 상품 추천</button>
            <button class="quick-btn" onclick="sendQuick('머그잔 추천해줘')">머그잔 종류</button>
            <button class="quick-btn" onclick="sendQuick('배송은 얼마나 걸려?')">배송 안내</button>
            <button class="quick-btn" onclick="sendQuick('교환 반품 어떻게 해?')">교환/반품</button>
            <button class="quick-btn" onclick="sendQuick('선물하기 좋은 상품 추천해줘')">선물 추천</button>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="chat-input-wrap">
            <input type="text" class="chat-input" id="chatInput" placeholder="메시지를 입력해주세요..."
                onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="chat-send-btn" onclick="sendMessage()">전송</button>
        </div>
    </main>

    <script>
        let chatHistory = [];

        window.onload = () => {
            addMessage('bot', '안녕하세요! PLATE & HOME 쇼핑 도우미입니다. 상품 추천, 배송, 교환/반품 등 궁금한 점을 편하게 물어보세요 😊');
        };

        function addMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            const avatar = role === 'bot' ? '🍽' : '👤';
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = `
                <div class="msg-avatar">${avatar}</div>
                <div class="msg-bubble">${text}</div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'msg bot';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="msg-avatar">🍽</div>
                <div class="typing"><span></span><span></span><span></span></div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            addMessage('user', message);
            chatHistory.push({ role: 'user', content: message });
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history: chatHistory.slice(-10) })
                });
                const data = await response.json();
                removeTyping();
                addMessage('bot', data.reply);
                chatHistory.push({ role: 'assistant', content: data.reply });

                if (data.products && data.products.length > 0) {
                    addProductCards(data.products);
                }
            } catch (e) {
                removeTyping();
                addMessage('bot', '죄송합니다, 일시적인 오류가 발생했습니다. 다시 시도해주세요.');
            }
        }

        function addProductCards(products) {
            const chatBox = document.getElementById('chatBox');
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'display:flex; flex-wrap:wrap; gap:12px; padding:4px 0;';

            products.forEach(p => {
                const card = document.createElement('div');
                card.onclick = () => window.location.href = `./sub.html?id=${p.id}`;
                card.style.cssText = `
            width: 160px; border: 1px solid #e5e5e5; background: #fff;
            cursor: pointer; transition: transform 0.2s;
            border-radius: 4px; overflow: hidden;
        `;
                card.onmouseover = () => card.style.transform = 'translateY(-4px)';
                card.onmouseout = () => card.style.transform = 'translateY(0)';
                card.innerHTML = `
            <div style="width:100%; aspect-ratio:1/1; overflow:hidden; background:#f5f5f5;">
                <img src="${p.image}" alt="${p.name}" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div style="padding:10px;">
                <div style="font-size:12px; color:#333; line-height:1.4; margin-bottom:6px;
                    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">
                    ${p.name}
                </div>
                <div style="font-size:13px; font-weight:700; color:#111;">
                    ${p.price.toLocaleString('ko-KR')}원
                </div>
                ${p.badge ? `<span style="display:inline-block; margin-top:4px; padding:2px 8px; background:#111; color:#fff; font-size:10px; border-radius:99px;">${p.badge}</span>` : ''}
            </div>
        `;
                wrapper.appendChild(card);
            });

            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendQuick(text) {
            document.getElementById('chatInput').value = text;
            sendMessage();
        }
    </script>
    <script src="./js/header.js"></script>
</body>

</html>
