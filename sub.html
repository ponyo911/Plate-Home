<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상품 상세</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/sub.css" />
</head>

<body class="sub-page">
    <header class="header" id="header">
        <div class="inner header-inner">
            <a href="./index.html" class="logo">PLATE &amp; HOME</a>

            <nav class="nav" id="nav">
                <ul id="navMenu"></ul>
            </nav>

            <div class="header-right">
                <div class="header-links">
                    <button type="button" class="header-link-btn">장바구니</button>
                    <span class="header-divider">|</span>
                    <button type="button" class="header-link-btn">로그인/회원가입</button>
                    <span class="header-divider">|</span>
                </div>

                <button class="menu-toggle-btn" id="mobileMenuBtn" aria-label="메뉴">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="detail-page">
        <section class="detail-top section-spacing">
            <div class="inner detail-static-layout">
                <div class="detail-left">
                    <div class="detail-image-wrap section-box">
                        <div class="detail-image">
                            <img id="detailImage" src="" alt="">
                        </div>

                        <div class="detail-thumb-list">
                            <img id="detailThumb1" src="" alt="">
                            <img id="detailThumb2" src="" alt="">
                            <img id="detailThumb3" src="" alt="">
                        </div>
                    </div>

                    <section class="detail-tabs">
                        <button type="button" class="tab-btn active">상세정보</button>
                        <button type="button" class="tab-btn">구매안내</button>
                        <button type="button" class="tab-btn">배송/교환</button>
                    </section>

                    <section class="detail-content">
                        <div class="detail-image-stack section-box">
                            <img id="detailStack1" src="" alt="상세 이미지 1">
                            <img id="detailStack2" src="" alt="상세 이미지 2">
                            <img id="detailStack3" src="" alt="상세 이미지 3">
                            <img id="detailStack4" src="" alt="상세 이미지 4">
                            <img id="detailStack5" src="" alt="상세 이미지 5">
                        </div>

                        <div class="detail-spec section-box">
                            <h3>상품 정보</h3>
                            <div class="spec-table">
                                <div class="spec-row">
                                    <span class="spec-label">상품명</span>
                                    <span class="spec-value" id="detailSpecName"></span>
                                </div>
                                <div class="spec-row">
                                    <span class="spec-label">소재</span>
                                    <span class="spec-value" id="detailMaterial"></span>
                                </div>
                                <div class="spec-row">
                                    <span class="spec-label">사이즈</span>
                                    <span class="spec-value" id="detailSize"></span>
                                </div>
                                <div class="spec-row">
                                    <span class="spec-label">용도</span>
                                    <span class="spec-value" id="detailVolume"></span>
                                </div>
                                <div class="spec-row">
                                    <span class="spec-label">구성</span>
                                    <span class="spec-value">머그 1P</span>
                                </div>
                            </div>
                        </div>

                        <div class="detail-notice section-box">
                            <h3>주의사항</h3>
                            <p id="detailNotice"></p>
                        </div>

                        <div class="detail-shipping section-box">
                            <h3>배송 안내</h3>
                            <p id="detailShipping"></p>
                        </div>

                        <div class="detail-related section-box">
                            <h3>같이 보면 좋은 상품</h3>
                            <div id="relatedProducts" class="product-grid cols-4"></div>
                        </div>
                    </section>
                </div>

                <aside class="detail-info purchase-panel section-box">
                    <p class="detail-category">PALTE & HOME</p>
                    <h1 id="detailName"></h1>
                    <p id="detailPrice" class="detail-price"></p>
                    <p id="detailDesc" class="detail-desc"></p>

                    <div class="detail-meta">
                        <div class="meta-row">
                            <span class="meta-label">배송안내</span>
                            <span class="meta-value">기본 배송 2~5일 소요 / 일부 지역 추가 배송비 발생 가능</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">혜택정보</span>
                            <span class="meta-value">신규 회원 쿠폰 및 다양한 프로모션 적용 가능</span>
                        </div>
                    </div>

                    <div class="detail-option-box">
                        <label for="quantity">수량</label>
                        <div class="quantity-wrap">
                            <button type="button" class="qty-btn" id="qtyMinus">-</button>
                            <input type="number" id="quantity" value="1" min="1">
                            <button type="button" class="qty-btn" id="qtyPlus">+</button>
                        </div>
                    </div>

                    <div class="detail-total-box">
                        <span>총 상품 금액</span>
                        <strong id="detailTotalPrice">0원</strong>
                    </div>

                    <div class="detail-buttons">
                        <button class="btn-cart" type="button">장바구니</button>
                        <button class="btn-buy" type="button">구매하기</button>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <footer class="footer" id="footer"></footer>

    <script src="./js/app.js"></script>
    <script src="./js/header.js"></script>
</body>

</html>
