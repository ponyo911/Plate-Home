<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 내역 | PLATE & HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <style>
        .order-wrap {
            max-width: 1200px;
            margin: 120px auto 80px;
            padding: 0 24px;
        }

        .order-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            border-bottom: 2px solid #111;
            padding-bottom: 16px;
        }

        .order-card {
            border: 1px solid #e5e5e5;
            padding: 24px;
            margin-bottom: 20px;
            background: #fff;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #444;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="inner header-inner">
            <a href="./index.html" class="logo">PLATE &amp; HOME</a>
            <div class="header-right">
                <div class="header-links">
                    <a href="./cart.html" class="header-link-btn">장바구니</a>
                </div>
            </div>
        </div>
    </header>

    <main class="order-wrap">
        <h2 class="order-title">주문 내역</h2>
        <div id="orderContainer">
        </div>
    </main>

    <script>
        async function fetchOrders() {
            // 1. 내 아이디 확인
            const userId = localStorage.getItem("userId");
            if (!userId) {
                alert("로그인이 필요한 서비스입니다.");
                window.location.href = "./login.html";
                return;
            }

            const container = document.getElementById("orderContainer");
            try {
                // 2. 백엔드에 내 아이디(userId)를 쿼리로 보내서 내 주문만 가져옵니다!
                const response = await fetch(`/api/orders?user_id=${userId}`);
                const data = await response.json();

                if (data.orders.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:80px 0; color:#888;">결제된 주문 내역이 없습니다.</div>`;
                    return;
                }

                let html = "";
                data.orders.forEach(order => {
                    let itemsHtml = order.items.map(item => `
                    <div class="order-item" style="display:flex; align-items:center; gap:14px; margin-bottom:12px;">
                        <img src="/api/product-image/${item.product_id}" alt="${item.name}"
                            style="width:70px; height:70px; object-fit:cover; background:#f5f5f5; flex-shrink:0;"
                            onerror="this.style.display='none'">
                        <div style="flex:1;">
                            <div style="font-size:14px; color:#333; margin-bottom:4px;">${item.name}</div>
                            <div style="font-size:13px; color:#888;">수량: ${item.quantity}개</div>
                        </div>
                        <div style="font-size:14px; font-weight:700; color:#111;">
                            ${(item.price * item.quantity).toLocaleString("ko-KR")}원
                        </div>
                    </div>
                `).join('');

                    // 3. 주문 상태 표시 뱃지 추가 (order.status)
                    const statusText = order.status || '결제완료';
                    let statusColor = '#444'; // 결제완료
                    if (statusText === '상품준비중') statusColor = '#f39c12';
                    if (statusText === '배송중') statusColor = '#3498db';
                    if (statusText === '배송완료') statusColor = '#27ae60';
                    html += `
                        <div class="order-card">
                            <div class="order-header">
                                <div>
                                    <span style="background: ${statusColor}; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 10px;">
                                        ${statusText}
                                    </span>
                                    <strong>주문번호: ${order.id}</strong>
                                </div>
                                <span style="color:#888; font-size:13px;">${new Date(order.created_at).toLocaleString("ko-KR")}</span>
                            </div>
                            <div style="margin-bottom: 16px;">
                                ${itemsHtml}
                            </div>
                            <div style="text-align: right; font-weight: 700; font-size: 18px; color: #111;">
                                총 결제 금액: ${order.total_amount.toLocaleString("ko-KR")}원
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

            } catch (error) {
                console.error("데이터 로드 실패:", error);
                container.innerHTML = `<div style="text-align:center; padding:80px 0; color:#888;">데이터를 불러오는 중 오류가 발생했습니다.</div>`;
            }
        }

        document.addEventListener("DOMContentLoaded", fetchOrders);    
    </script>
    <script src="./js/header.js"></script>
</body>

</html>
