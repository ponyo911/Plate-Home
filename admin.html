<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 | PLATE & HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <style>
        .admin-wrap {
            max-width: 1200px;
            margin: 100px auto 80px;
            padding: 0 24px;
        }

        .admin-title {
            font-size: 28px;
            font-weight: 700;
            border-bottom: 2px solid #111;
            padding-bottom: 16px;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }

        th,
        td {
            border-bottom: 1px solid #e5e5e5;
            padding: 16px 12px;
            text-align: center;
            font-size: 14px;
        }

        th {
            background: #f9f9f9;
            font-weight: 700;
            color: #333;
        }

        .status-select {
            padding: 6px 10px;
            border: 1px solid #ccc;
            font-size: 13px;
            border-radius: 4px;
        }

        .tab-btn {
            font-size: 18px;
            font-weight: 700;
            border: none;
            background: none;
            cursor: pointer;
            padding-bottom: 8px;
            color: #888;
        }

        .tab-btn.active {
            color: #111;
            border-bottom: 2px solid #111;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="inner header-inner">
            <a href="./index.html" class="logo">PLATE &amp; HOME <span
                    style="color:red; font-size:14px;">(ADMIN)</span></a>
        </div>
    </header>

    <main class="admin-wrap">
        <div style="display: flex; gap: 20px; margin-bottom: 30px;">
            <button onclick="switchTab('order')" id="tabOrder" class="tab-btn active">주문 관리</button>
            <button onclick="switchTab('product')" id="tabProduct" class="tab-btn">상품 관리</button>
            <button onclick="switchTab('user')" id="tabUser" class="tab-btn">회원 관리</button>
        </div>
        <section id="sectionOrder">
            <h2 class="admin-title">전체 주문 현황</h2>
            <table>
                <thead>
                    <tr>
                        <th>주문번호</th>
                        <th>주문자명</th>
                        <th>총 결제금액</th>
                        <th>주문 일시</th>
                        <th>주문 상태 관리</th>
                    </tr>
                </thead>
                <tbody id="adminOrderList"></tbody>
            </table>
        </section>

        <section id="sectionProduct" style="display: none;">
            <div style="margin-bottom: 30px; padding: 24px; border: 1px solid #e5e5e5; background: #fafafa;">
                <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 16px;">신규 상품 등록</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                    <input type="text" id="newProductName" placeholder="상품명"
                        style="height: 40px; border: 1px solid #ccc; padding: 0 12px; font-size: 14px;">
                    <input type="number" id="newProductPrice" placeholder="가격 (숫자만)"
                        style="height: 40px; border: 1px solid #ccc; padding: 0 12px; font-size: 14px;">
                    <input type="text" id="newProductImage" placeholder="이미지 경로 (예: img/NEW1.jpg)"
                        style="height: 40px; border: 1px solid #ccc; padding: 0 12px; font-size: 14px;">
                    <select id="newProductCategory"
                        style="height: 40px; border: 1px solid #ccc; padding: 0 12px; font-size: 14px;">
                        <option value="featured">Best Items</option>
                        <option value="new">New</option>
                        <option value="collection">Collection</option>
                        <option value="mug">Mug</option>
                        <option value="plate">Plate</option>
                        <option value="tableware">Tableware</option>
                    </select>
                </div>
                <button onclick="addProduct()"
                    style="background: #111; color: #fff; padding: 10px 28px; font-size: 14px; font-weight: 700; border: none; cursor: pointer;">등록</button>
            </div>
            <h2 class="admin-title">등록된 상품 목록</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>상품명</th>
                        <th>가격</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="adminProductList"></tbody>
            </table>
        </section>
        <section id="sectionUser" style="display: none;">
            <h2 class="admin-title">회원 목록</h2>
            <table>
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>이메일</th>
                        <th>가입일</th>
                        <th>권한</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="adminUserList"></tbody>
            </table>
        </section>
    </main>

    <script>
        // 주문 목록 로드
        async function fetchAdminOrders() {
            const container = document.getElementById("adminOrderList");
            try {
                const response = await fetch("/api/orders");
                const data = await response.json();
                if (!data.orders || data.orders.length === 0) {
                    container.innerHTML = `<tr><td colspan="5" style="padding: 40px; color:#888;">접수된 주문이 없습니다.</td></tr>`;
                    return;
                }
                let html = "";
                data.orders.forEach(order => {
                    const status = order.status || '결제완료';
                    let badgeColor = '#444';
                    if (status === '상품준비중') badgeColor = '#f39c12';
                    if (status === '배송중') badgeColor = '#3498db';
                    if (status === '배송완료') badgeColor = '#27ae60';

                    html += `<tr>
                        <td><strong>${order.id}</strong></td>
                        <td>${order.customer_name}</td>
                        <td>${order.total_amount.toLocaleString()}원</td>
                        <td>${new Date(order.created_at).toLocaleString("ko-KR")}</td>
                        <td>
                            <span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:${badgeColor}; margin-right:8px;"></span>
                            <select class="status-select" onchange="updateOrderStatus(${order.id}, this.value)" style="border-color:${badgeColor}">
                                <option value="결제완료" ${status === '결제완료' ? 'selected' : ''}>결제완료</option>
                                <option value="상품준비중" ${status === '상품준비중' ? 'selected' : ''}>상품준비중</option>
                                <option value="배송중" ${status === '배송중' ? 'selected' : ''}>배송중</option>
                                <option value="배송완료" ${status === '배송완료' ? 'selected' : ''}>배송완료</option>
                            </select>
                        </td>
                    </tr>`;
                });
                container.innerHTML = html;
            } catch (e) { console.error(e); }
        }

        async function addProduct() {
            const name = document.getElementById("newProductName").value.trim();
            const price = document.getElementById("newProductPrice").value.trim();
            const image = document.getElementById("newProductImage").value.trim();
            const category = document.getElementById("newProductCategory").value;

            if (!name || !price || !image) {
                alert("상품명, 가격, 이미지 경로를 모두 입력해주세요.");
                return;
            }

            const response = await fetch("/api/products", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name,
                    price: parseInt(price),
                    image,
                    category,
                    badge: "NEW",
                    discount: 0,
                    oldPrice: parseInt(price)
                })
            });

            const result = await response.json();
            if (response.ok) {
                alert("상품이 등록되었습니다.");
                document.getElementById("newProductName").value = "";
                document.getElementById("newProductPrice").value = "";
                document.getElementById("newProductImage").value = "";
                fetchAdminProducts();
            } else {
                alert("등록 실패: " + result.detail);
            }
        }

        // 상품 목록 로드
        async function fetchAdminProducts() {
            const container = document.getElementById("adminProductList");
            try {
                const response = await fetch("/api/products");
                const products = await response.json();
                if (!products || products.length === 0) {
                    container.innerHTML = `<tr><td colspan="4" style="padding:40px; color:#888;">등록된 상품이 없습니다.</td></tr>`;
                    return;
                }
                let html = "";
                products.forEach(p => {
                    html += `<tr>
                <td>${p.id}</td>
                <td style="text-align:left;">${p.name}</td>
                <td>${p.price.toLocaleString()}원</td>
                <td><button onclick="deleteProduct('${p.id}')" style="color:red; border:1px solid red; background:#fff; cursor:pointer; padding:2px 8px;">삭제</button></td>
            </tr>`;
                });
                container.innerHTML = html;
            } catch (e) {
                console.error(e);
            }
        }

        // 주문 상태 업데이트
        async function updateOrderStatus(id, status) {
            await fetch(`/api/orders/${id}/status`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status })
            });
            fetchAdminOrders();
        }

        // 상품 삭제
        async function deleteProduct(id) {
            if (!confirm("삭제하시겠습니까?")) return;
            await fetch(`/api/products/${id}`, { method: "DELETE" });
            fetchAdminProducts();
        }

        // 탭 전환
        function switchTab(type) {
            document.getElementById('sectionOrder').style.display = type === 'order' ? 'block' : 'none';
            document.getElementById('sectionProduct').style.display = type === 'product' ? 'block' : 'none';
            document.getElementById('sectionUser').style.display = type === 'user' ? 'block' : 'none';
            document.getElementById('tabOrder').className = type === 'order' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tabProduct').className = type === 'product' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tabUser').className = type === 'user' ? 'tab-btn active' : 'tab-btn';
            if (type === 'order') fetchAdminOrders();
            if (type === 'product') fetchAdminProducts();
            if (type === 'user') fetchAdminUsers();
        }

        async function fetchAdminUsers() {
            const container = document.getElementById("adminUserList");
            try {
                const response = await fetch("/api/users");
                const data = await response.json();
                if (!data.users || data.users.length === 0) {
                    container.innerHTML = `<tr><td colspan="5" style="padding:40px; color:#888;">회원이 없습니다.</td></tr>`;
                    return;
                }
                let html = "";
                data.users.forEach(user => {
                    const isAdmin = user.role === 'admin';
                    html += `<tr>
                <td><strong>${user.user_name}</strong></td>
                <td>${user.email || user.user_id}</td>
                <td>${new Date(user.created_at).toLocaleString("ko-KR")}</td>
                <td>
                    <span style="display:inline-block; padding:2px 10px; border-radius:99px; font-size:12px; font-weight:700;
                        background:${isAdmin ? '#e74c3c' : '#f0f0f0'}; color:${isAdmin ? '#fff' : '#555'};">
                        ${isAdmin ? '관리자' : '일반회원'}
                    </span>
                </td>
                <td style="text-align:center; vertical-align:middle;">
                    <div style="display:flex; gap:6px; justify-content:center; align-items:center; min-height:28px;">
                        ${!isAdmin ? `
                            <button onclick="updateUserRole('${user.user_id}', 'admin')"
                                style="color:#e74c3c; border:1px solid #e74c3c; background:#fff; cursor:pointer; padding:2px 8px; font-size:12px; border-radius:3px;">
                                관리자 승격
                            </button>
                            <button onclick="deleteUser('${user.user_id}')"
                                style="color:#888; border:1px solid #ccc; background:#fff; cursor:pointer; padding:2px 8px; font-size:12px; border-radius:3px;">
                                삭제
                            </button>
                        ` : `<span style="font-size:12px; color:#aaa; display:flex; align-items:center; justify-content:center; width:100%; min-height:28px;">-</span>`}
                    </div>
                </td>
            </tr>`;
                });
                container.innerHTML = html;
            } catch (e) {
                console.error(e);
            }
        }

        async function updateUserRole(userId, role) {
            if (!confirm(`해당 회원을 관리자로 승격하시겠습니까?`)) return;
            await fetch(`/api/users/${userId}/role`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ role })
            });
            fetchAdminUsers();
        }

        async function deleteUser(userId) {
            if (!confirm("해당 회원을 삭제하시겠습니까?")) return;
            await fetch(`/api/users/${userId}`, { method: "DELETE" });
            fetchAdminUsers();
        }

        document.addEventListener("DOMContentLoaded", () => {
            const userRole = localStorage.getItem("userRole");
            if (userRole !== "admin") {
                alert("권한이 없습니다.");
                window.location.href = "/index.html";
                return;
            }
            fetchAdminOrders();
        });
    </script>
    <script src="./js/header.js"></script>
</body>

</html>
